<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pardhiv Developer | Portfolio</title>
    
    <meta name="description" content="Accessible frontend developer portfolio.">
    <link rel="canonical" href="https://yourdomain.com/">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

   <header>
        <div class="logo">PardhivDev</div>
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="index.html" aria-current="page">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
  
  <section aria-labelledby="weather-heading" style="margin-top: 4rem; border-top: 1px solid var(--border-color); padding-top: 3rem;">
    <h2 id="weather-heading">Real-Time Weather Dashboard</h2>
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Fetching real-time nested JSON metrics using async/await expressions.</p>

    <div class="weather-app">
      <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
        <input type="text" id="weather-city" placeholder="Enter city name (e.g., London, Hyderabad)" style="flex: 1; min-width: 200px;">
        <button id="weather-search-btn" style="white-space: nowrap; min-width: 150px;">Search Weather</button>
      </div>

      <div id="weather-status" style="margin-bottom: 1rem; color: #f59e0b; font-weight: 500;"></div>

      <div id="weather-display" style="display: none;">
        <h3 id="display-city-name" style="margin-bottom: 1.5rem; font-size: 1.5rem;">City Name</h3>
        
        <div class="weather-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1.5rem;">
          <div class="weather-card">
            <h4>Temperature</h4>
            <p id="metric-temp" class="weather-value">--°C</p>
          </div>
          <div class="weather-card">
            <h4>Humidity</h4>
            <p id="metric-humidity" class="weather-value">--%</p>
          </div>
          <div class="weather-card">
            <h4>Wind Speed</h4>
            <p id="metric-wind" class="weather-value">-- km/h</p>
          </div>
        </div>
      </div>
    </div>
  </section>

</main>

    <footer>
        <p>&copy; 2026 Pardhiv Developer. All rights reserved.</p>
    </footer>
<script src="app.js"></script>
</body>
</html>
