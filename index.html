<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pardhiv Developer | Portfolio</title>
    
    <meta name="description" content="Accessible frontend developer portfolio.">
    <link rel="canonical" href="https://yourdomain.com/">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

   <header>
        <div class="logo">PardhivDev</div>
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="index.html" aria-current="page">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
  
  <section aria-labelledby="todo-heading" style="margin-top: 4rem; border-top: 1px solid var(--border-color); padding-top: 3rem;">
    <h2 id="todo-heading">Task Manager Application</h2>
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Demonstrating dynamic DOM manipulation and localStorage states.</p>

    <div class="todo-app">
      <form id="todo-form" style="max-width: 100%; display: flex; gap: 1rem; margin: 1rem 0;">
        <input type="text" id="todo-input" placeholder="What needs to be done?" required style="flex: 1;">
        <button type="submit">Add Task</button>
      </form>

      <div class="todo-filters" style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <ul id="todo-list" style="list-style: none; display: flex; flex-direction: column; gap: 0.75rem;">
        </ul>
    </div>
  </section>

</main>

    <footer>
        <p>&copy; 2026 Pardhiv Developer. All rights reserved.</p>
    </footer>
<script src="app.js"></script>
</body>
</html>
