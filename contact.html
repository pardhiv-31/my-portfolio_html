<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Pardhiv | Portfolio</title>
    <meta name="description" content="Get in touch with Pardhiv Developer.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
        <div class="logo">PardhivDev</div>
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <section aria-labelledby="contact-heading">
            <h1 id="contact-heading">Get In Touch</h1>
            
            <form action="#" method="POST" style="margin-top: 20px;">
                
                <div style="margin-bottom: 15px;">
                    <label for="name" style="display: block; font-weight: bold;">Full Name</label>
                    <input type="text" id="name" name="name" required style="width: 100%; padding: 8px; margin-top: 5px;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label for="email" style="display: block; font-weight: bold;">Email Address</label>
                    <input type="email" id="email" name="email" required style="width: 100%; padding: 8px; margin-top: 5px;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label for="message" style="display: block; font-weight: bold;">Your Message</label>
                    <textarea id="message" name="message" rows="5" required style="width: 100%; padding: 8px; margin-top: 5px;"></textarea>
                </div>

                <button type="submit" style="padding: 10px 20px; background: #0066cc; color: white; border: none; cursor: pointer; font-weight: bold;">Send Message</button>

            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Pardhiv Developer. All rights reserved.</p>
    </footer>

</body>
</html>
